name: Docker Analytics

on:
  push:
    branches: ["main"]
    paths:
      - "apps/dagster/**"

jobs:
  release_dagster_docker:
    name: Build Docker image (Analytics)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Github ENV variables
        shell: bash
        run: |
          echo "BUILD_TIMESTAMP=$(date '+%F %H:%M:%S')" >> $GITHUB_ENV
          echo "GIT_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_BLOBSCAN_RELEASE=$(git describe --tags)" >> $GITHUB_ENV

      - name: Build and push (dagster)
        uses: docker/build-push-action@v6.5.0
        with:
          context: ./apps/dagster
          push: true
          tags: |
            blossomlabs/blobscan-dagster:development
